[tool.ruff]
target-version = "py312"
line-length = 110
extend-exclude = ["notebooks", "data", "models", "reports", "results"]

[tool.ruff.lint]
# E (pycodestyle) + F (pyflakes) defaults; nothing extra by choice.
ignore = [
    "E501",  # line-too-long: long ML configs are intentional, broken across lines below the cap most of the time
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::FutureWarning",
]
